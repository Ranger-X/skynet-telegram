[tools]
python = "3.14" # [optional] will be used for the venv
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.post_install]
run = "uv venv && uv pip install -r requirements.txt"

[tasks.sync-deps]
description = "Sync requirements.txt via uv only if the file changed"
# Define the file mise should watch for changes
sources = ["requirements.txt"]
# An empty file mise touches to remember when it last synced successfully
outputs = [".venv/.mise-synced"]
run = """
uv pip install -r requirements.txt
touch .venv/.mise-synced
"""

[tasks.start]
description = "Run the development server"
depends = ["sync-deps"] # <-- Mise checks for requirements.txt updates first!
run = "uv run main.py"
